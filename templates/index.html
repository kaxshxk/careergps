<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerGPS - Home</title>
</head>
<body>
    <h1>Welcome to CareerGPS</h1>
    <p>Select an option below to proceed:</p>
    <ul>
        <li><a href="/profile" id="link-profile">Update User Profile</a></li>
    </ul>
    
    <h2>Test Career Recommendation</h2>
    <form action="/recommend" method="POST" id="form-recommend">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <label for="skills">Skills (e.g. Python, SQL):</label><br>
        <input type="text" id="skills" name="skills" value="Python, SQL" required><br><br>
        
        <label for="experience">Experience (Years):</label><br>
        <input type="number" id="experience" name="experience" value="3" required><br><br>
        
        <button type="submit" id="btn-submit">Submit Recommendation Request</button>
    </form>
</body>
</html>
