<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Update</title>
</head>
<body>
    <h1>Update Profile</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul style="color: green;">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/profile">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <p>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" value="{{ session.get('name', '') }}" required>
        </p>
        
        <p>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" value="{{ session.get('email', '') }}" required>
        </p>

        <p>
            <label for="skills">Skills:</label><br>
            <input type="text" id="skills" name="skills" value="{{ session.get('skills', '') }}" required>
        </p>
        
        <button type="submit">Save Changes</button>
    </form>
    <p><a href="/">Back to Home</a></p>
</body>
</html>
